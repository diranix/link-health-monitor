name: Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: SAST
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install bandit semgrep

      - name: Bandit
        run: |
          bandit -r app/ -ll

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/docker
            p/github-actions
